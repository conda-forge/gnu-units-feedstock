{% set name = "gnu-units" %}
{% set version = "2.26" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://ftp.gnu.org/gnu/units/units-{{ version }}.tar.gz
  sha256: 4c43f7a49fe2212ee433d3c0755a0a1935db35497c4a56bf9f68c5f718873c54

build:
  number: 0
  skip: true  # [win]
  script:
    - ./configure --prefix={{ PREFIX }}
    - make
    - make check
    - make install

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - make

test:
  commands:
    - units m feet

about:
  home: https://www.gnu.org/software/units/
  license: GPL-2.0-or-later
  license_file: COPYING
  summary: GNU Units converts quantities expressed in various systems of measurement to their equivalents in other systems of measurement

extra:
  recipe-maintainers:
    - ngam
